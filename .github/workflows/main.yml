name: Tennis ML Prediction System

on:
  schedule:
    - cron: '0 8 * * *' # Se activa solo a las 8:00 AM UTC diariamente
  workflow_dispatch: # Activa el botón manual verde en la app/web de tu celular

jobs:
  run-ml-system:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el repositorio actual
      uses: actions/checkout@v4

    - name: Configurar Entorno de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Librerías de Datos
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Predicciones de Tenis
      env:
        SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
      run: python predict.py
