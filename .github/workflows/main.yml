name: Tennis ML Prediction System

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  run-ml-system:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Clonar el repositorio actual
      uses: actions/checkout@v4

    - name: Configurar Entorno de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Librerías de Datos
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Predicciones y Guardar Datos
      env:
        SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
      run: python predict.py

    - name: Auto-Guardar Cambios en Repositorio (Almacenamiento Continuo)
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add historico_entrenamiento.csv registro_predicciones.csv || true
        git commit -m "Expansión masiva de matriz y logs de entrenamiento [Skip CI]" || echo "No hay nuevos datos."
        git push
