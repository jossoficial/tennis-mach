name: Tennis ML Prediction System

on:
  schedule:
    - cron: '0 8 * * *' # Todos los días a las 8:00 AM UTC
  workflow_dispatch: # Permite ejecución manual por botón en entorno web móvil

jobs:
  run-ml-system:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permiso explícito indispensable para guardar los archivos CSV en tu GitHub

    steps:
    - name: Clonar el repositorio actual
      uses: actions/checkout@v4

    - name: Configurar Entorno de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Librerías de Datos
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Predicciones y Guardar Datos
      env:
        SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
      run: python predict.py

    - name: Auto-Guardar Cambios en Repositorio (Almacenamiento Continuo)
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        # Agrega únicamente los CSV generados para evitar conflictos
        git add historico_entrenamiento.csv registro_predicciones.csv || true
        # Commit de cambios solo si hay nuevos registros guardados
        git commit -m "Auto-actualización de base de datos de entrenamiento y predicciones [Skip CI]" || echo "No hay nuevos datos para resguardar hoy."
        git push
